name: API Production CI/CD (Self-Hosted)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: api-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-main:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy-main:
    runs-on: [self-hosted, linux, x64]
    needs: build-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Restart PM2 app
        run: |
          pm2 start ecosystem.config.cjs --env production || pm2 restart coast-rate-source
          pm2 save

      - name: Health check
        run: curl -fsS http://127.0.0.1:3002/health
