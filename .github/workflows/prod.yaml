name: API Production CI/CD (Self-Hosted)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: api-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-main:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy-main:
    runs-on: [self-hosted, linux, x64]
    needs: build-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Restart PM2 app
        run: |
          pm2 delete rate_source_backend || true
          pm2 startOrReload ecosystem.config.cjs --env production --update-env
          pm2 save

      - name: Health check with retries
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3002/health; then
              echo "Health check passed"
              exit 0
            fi

            echo "Health check attempt $i failed; retrying in 2s..."
            sleep 2
          done

          echo "Health check failed after retries. Dumping PM2 diagnostics..."
          pm2 status
          pm2 logs web-api-landing-rate --lines 100 --nostream
          exit 1
